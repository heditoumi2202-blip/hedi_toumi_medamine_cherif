<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie</title>
    <link rel="stylesheet" href="../style_v2.css">
    <style>
        .category-hero {
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        linear-gradient(135deg, #667eea, #764ba2);
            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            text-align: center;
            color: white;
        }
        .category-hero .hero-content h1 {
            font-size: 48px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .category-hero .hero-content p {
            font-size: 18px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        .gallery-section {
            padding: 60px 20px;
            background: #f5f5f5;
        }
        .gallery-section .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }

        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            transition: filter 0.3s ease, transform 0.3s ease;
            filter: brightness(1);
        }
        .gallery-item:hover img {
            transform: scale(1.08);
            filter: brightness(0.95);
        }
        .item-info {
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5 0%, #ede7f6 100%);
        }
        .item-info h3 {
            color: #4a148c;
            font-size: 20px;
            margin-bottom: 8px;
        }
        .item-info p {
            color: #555;
            font-size: 14px;
            margin: 0;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .add-section {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
        }
        .add-section input[type="text"] {
            margin: 10px 5px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .add-section input[type="file"] {
            display: none;
        }
        .file-label {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
            background: linear-gradient(135deg, #7e57c2, #4a148c);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-right: 10px;
        }
        .file-label:hover {
            background: linear-gradient(135deg, #5e35b1, #311b92);
            transform: translateY(-2px);
        }
        .add-section button {
            padding: 10px 20px;
            border-radius: 30px;
            background: white;
            color: #4a148c;
            border: 2px solid #4a148c;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .add-section button:hover {
            background: #4a148c;
            color: white;
            transform: translateY(-2px);
        }

        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .message.success { background: #d4edda; color: #155724; }
        .message.error   { background: #f8d7da; color: #721c24; }

        .login-prompt {
            padding: 10px;
            background: #fff3cd;
            color: #856404;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .back-section {
            padding: 40px 20px;
            background: #f8f8f8;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            background: #4a148c;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        .back-btn:hover {
            background: #311b92;
            transform: translateX(-5px);
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
            .category-hero .hero-content h1 { font-size: 32px; }
            .gallery-item img { height: 200px; }
        }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .category-hero .hero-content h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <a href="../index_v2.html" class="logo">Through My Eyes</a>
        <nav>
            <ul>
                <li><a href="../index_v2.html">Accueil</a></li>
                <li><a href="../index_v2.html#gallery">Galerie</a></li>
                <li><a href="../index_v2.html#about">À propos</a></li>
                <li><a href="../index_v2.html#contact">Contact</a></li>
                <li id="authNav"></li>
            </ul>
        </nav>
    </div>
</header>

<section class="category-hero" id="heroSection">
    <div class="hero-content">
        <h1 id="heroTitle">Galerie</h1>
        <p id="heroDesc"></p>
    </div>
</section>

<section class="gallery-section">
    <div class="container">
        <div id="addSection" style="display:none;">
            <div class="add-section">
                <h3>Ajouter une nouvelle image</h3>
                <input type="text" id="photoTitle" placeholder="Titre de la photo">
                <input type="text" id="photoDescription" placeholder="Description (optionnel)">
                <label for="imageInput" class="file-label">Sélectionner image</label>
                <input type="file" id="imageInput" accept="image/*">
                <button onclick="addImage()">Ajouter</button>
                <p id="message" class="message"></p>
            </div>
        </div>

        <div id="loginPrompt" class="login-prompt" style="display:none;">
            <p>Connectez-vous pour ajouter des images : <a href="../login.html">Se connecter</a> ou <a href="../register.html">Créer un compte</a></p>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            <p style="text-align:center;grid-column:1/-1;padding:40px;">Chargement...</p>
        </div>
    </div>
</section>

<section class="back-section">
    <div class="container">
        <a href="../index_v2.html" class="back-btn">← Retour aux catégories</a>
    </div>
</section>

<footer>
    <div class="container">
        <p>&copy; 2026 Through My Eyes - Galerie Photographique.</p>
    </div>
</footer>

<script src="../auth.js"></script>
<script src="../gallery.js"></script>
<script>
let CATEGORY_ID = null;
let CATEGORY_SLUG = null;

document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    CATEGORY_ID = params.get('id');
    if (!CATEGORY_ID) {
        document.body.innerHTML = '<p style="padding:40px;text-align:center;">Catégorie introuvable.</p>';
        return;
    }

    // Apply URL params immediately so the page renders without waiting for the API
    const urlSlug = params.get('slug');
    const urlName = params.get('name');
    const urlDesc = params.get('desc');
    if (urlSlug && urlName) {
        CATEGORY_SLUG = urlSlug;
        document.title = urlName + ' - Through My Eyes';
        document.getElementById('heroTitle').textContent = urlName;
        document.getElementById('heroDesc').textContent = urlDesc || '';
    }

    updateAuthNav();
    displayAddSection();

    await loadCategoryInfo();
    await loadGallery();
});

async function loadCategoryInfo() {
    try {
        const res = await fetch(`${API_URL}/categories`);
        if (!res.ok) return;
        const cats = await res.json();
        const cat = cats.find(c => c.id === CATEGORY_ID);
        if (!cat) return;
        CATEGORY_SLUG = cat.slug;
        document.title = cat.name + ' - Through My Eyes';
        document.getElementById('heroTitle').textContent = cat.name;
        document.getElementById('heroDesc').textContent = cat.description || '';
        if (cat.coverImage) {
            document.getElementById('heroSection').style.background =
                `linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('${cat.coverImage}') center/cover`;
        }
    } catch (e) { console.error(e); }
}

async function loadGallery() {
    const grid = document.getElementById('galleryGrid');
    try {
        if (!CATEGORY_SLUG) {
            grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;padding:40px;">Aucune photo ajoutée pour le moment.</p>';
            return;
        }

        let photos;
        if (auth.isLoggedIn()) {
            photos = await gallery.getUserPhotos(CATEGORY_SLUG);
        } else {
            photos = await gallery.getPhotosByCategory(CATEGORY_SLUG);
        }

        grid.innerHTML = '';

        if (!photos || photos.length === 0) {
            grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;padding:40px;">Aucune photo ajoutée pour le moment.</p>';
            return;
        }

        photos.forEach(photo => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            const pid = photo._id || photo.id;
            const isOwn = auth.isLoggedIn() && (() => {
                const uid = auth.getUser().id;
                const photoUid = typeof photo.uploadedBy === 'string' ? photo.uploadedBy : (photo.uploadedBy._id || photo.uploadedBy.id);
                return photoUid === uid;
            })();
            item.innerHTML = `
                <img src="${photo.imageUrl}" alt="${photo.title}" data-photo-id="${pid}"
                     onclick="gallery.openLightbox('${photo.imageUrl}','${photo.title}')" style="cursor:zoom-in;">
                ${isOwn ? `<button onclick="deleteItem('${pid}')" class="delete-btn">X</button>` : ''}
                <div class="item-info">
                    <h3>${photo.title}</h3>
                    <p>${photo.description || ''}</p>
                </div>
            `;
            grid.appendChild(item);
        });
    } catch (e) {
        console.error(e);
        grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;padding:40px;">Aucune photo ajoutée pour le moment.</p>';
    }
}

async function deleteItem(photoId) {
    const result = await gallery.deletePhoto(photoId);
    if (result.success) { loadGallery(); }
    else { alert(result.message); }
}

function updateAuthNav() {
    const nav = document.getElementById('authNav');
    if (auth.isLoggedIn()) {
        const user = auth.getUser();
        nav.innerHTML = `<span>${user.username}</span> | <a href="#" onclick="logout()">Déconnexion</a>`;
    } else {
        nav.innerHTML = `<a href="../login.html">Se connecter</a>`;
    }
}

function displayAddSection() {
    const add = document.getElementById('addSection');
    const prompt = document.getElementById('loginPrompt');
    if (auth.isLoggedIn()) {
        add.style.display = 'block';
        prompt.style.display = 'none';
    } else {
        add.style.display = 'none';
        prompt.style.display = 'block';
    }
}

async function addImage() {
    if (!auth.isLoggedIn()) { alert('Connectez-vous pour ajouter une image'); return; }
    const input = document.getElementById('imageInput');
    const title = document.getElementById('photoTitle').value;
    const description = document.getElementById('photoDescription').value;
    const file = input.files[0];
    const message = document.getElementById('message');

    if (!file) { message.className = 'message error'; message.textContent = 'Sélectionnez une image !'; return; }
    if (!title) { message.className = 'message error'; message.textContent = 'Entrez un titre !'; return; }

    const imageUrl = await gallery.fileToBase64(file);
    const result = await gallery.addPhoto(title, description, CATEGORY_SLUG, imageUrl);

    if (result.success) {
        message.className = 'message success';
        message.textContent = 'Image ajoutée avec succès !';
        document.getElementById('photoTitle').value = '';
        document.getElementById('photoDescription').value = '';
        input.value = '';
        setTimeout(loadGallery, 800);
    } else {
        message.className = 'message error';
        message.textContent = result.message;
    }
}

function logout() {
    auth.logout();
    updateAuthNav();
    displayAddSection();
    loadGallery();
}
</script>
</body>
</html>
